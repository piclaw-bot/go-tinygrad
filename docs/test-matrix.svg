<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 656" font-family="system-ui,-apple-system,sans-serif">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f1218; } .hdr-bg { fill: #1e293b; } .sec-bg { fill: #1a1e28; }
      .hdr { fill: #e2e8f0; } .cell { fill: #cbd5e1; } .note { fill: #64748b; }
      .perf { fill: #86efac; } .title { fill: #f1f5f9; } .sub { fill: #64748b; }
      .pass { fill: #22c55e; } .fail { fill: #ef4444; } .warn { fill: #f59e0b; }
      .skip { fill: #475569; } .na { fill: #334155; }
      .footer { fill: #1e293b; } .footer-text { fill: #94a3b8; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f8fafc; } .hdr-bg { fill: #334155; } .sec-bg { fill: #e2e8f0; }
      .hdr { fill: #ffffff; } .cell { fill: #1e293b; } .note { fill: #64748b; }
      .perf { fill: #15803d; } .title { fill: #0f172a; } .sub { fill: #64748b; }
      .pass { fill: #22c55e; } .fail { fill: #ef4444; } .warn { fill: #f59e0b; }
      .skip { fill: #94a3b8; } .na { fill: #cbd5e1; }
      .footer { fill: #1e293b; } .footer-text { fill: #e2e8f0; }
    }
    text { font-family: -apple-system, "Segoe UI", Helvetica, sans-serif; }
    .title { font-size: 18px; font-weight: 700; }
    .sub { font-size: 11px; }
    .hdr { font-size: 11px; font-weight: 600; }
    .cell { font-size: 10.5px; }
    .note { font-size: 9.5px; }
    .perf { font-size: 10px; font-family: "SF Mono", Menlo, monospace; }
    .sec { font-size: 12px; font-weight: 600; }
    .footer-text { font-size: 11px; font-weight: 600; }
  </style>
  <rect width="920" height="656" rx="10" class="bg"/>
  <text x="24" y="30" class="title">go-tinygrad Test Matrix</text>
  <text x="24" y="46" class="sub">Pure Go + PTX · RTX 3060 12GB · 7 packages · 66 tests · 25+ commits</text>
  <g transform="translate(620,24)"><circle cx="0" cy="0" r="5" class="pass"/><text x="10" y="4" class="cell">Pass</text><circle cx="70" cy="0" r="5" class="warn"/><text x="80" y="4" class="cell">Partial</text><circle cx="140" cy="0" r="5" class="skip"/><text x="150" y="4" class="cell">Skip</text><circle cx="210" cy="0" r="5" class="na"/><text x="220" y="4" class="cell">N/A</text></g>
  <rect x="0" y="58" width="920" height="24" class="hdr-bg"/>
  <text x="24" y="74" class="hdr">Component</text><text x="220" y="74" class="hdr">CPU</text><text x="300" y="74" class="hdr">GPU (purego)</text><text x="420" y="74" class="hdr">GPU (NV ioctl)</text><text x="555" y="74" class="hdr">Tests</text><text x="610" y="74" class="hdr">Performance</text><text x="800" y="74" class="hdr">Notes</text>
