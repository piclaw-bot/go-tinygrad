  <text x="24" y="118" class="cell">Tensor DAG + Realize</text><circle cx="240" cy="114" r="6" class="pass"/><circle cx="340" cy="114" r="6" class="na"/><circle cx="460" cy="114" r="6" class="na"/><text x="555" y="118" class="perf">48</text><text x="610" y="118" class="perf">—</text><text x="800" y="118" class="note">Lazy eval</text>
  <text x="24" y="138" class="cell">Elementwise Fusion</text><circle cx="240" cy="134" r="6" class="pass"/><circle cx="340" cy="134" r="6" class="na"/><circle cx="460" cy="134" r="6" class="na"/><text x="555" y="138" class="perf">✓</text><text x="610" y="138" class="perf">2× chained ops</text><text x="800" y="138" class="note">Fuse engine</text>
  <text x="24" y="158" class="cell">Pattern Rewrite (16 rules)</text><circle cx="240" cy="154" r="6" class="pass"/><circle cx="340" cy="154" r="6" class="na"/><circle cx="460" cy="154" r="6" class="na"/><text x="555" y="158" class="perf">✓</text><text x="610" y="158" class="perf">const fold</text><text x="800" y="158" class="note">tinygrad-style</text>
