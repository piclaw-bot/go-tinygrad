  <text x="24" y="424" class="cell">vec_add / vec_mul / vec_scale</text><circle cx="240" cy="420" r="6" class="pass"/><circle cx="340" cy="420" r="6" class="pass"/><circle cx="460" cy="420" r="6" class="na"/><text x="555" y="424" class="perf">4</text><text x="610" y="424" class="perf">Thresh ≥2048</text><text x="800" y="424" class="note">Auto fallback</text>
