  <text x="24" y="464" class="cell">rms_norm (shared mem reduce)</text><circle cx="240" cy="460" r="6" class="pass"/><circle cx="340" cy="460" r="6" class="pass"/><circle cx="460" cy="460" r="6" class="na"/><text x="555" y="464" class="perf">✓</text><text x="610" y="464" class="perf">256-thread</text><text x="800" y="464" class="note">rsqrt approx</text>
  <text x="24" y="484" class="cell">DevBuf (CPU↔GPU)</text><circle cx="240" cy="480" r="6" class="pass"/><circle cx="340" cy="480" r="6" class="pass"/><circle cx="460" cy="480" r="6" class="na"/><text x="555" y="484" class="perf">4</text><text x="610" y="484" class="perf">Lazy, MarkDirty</text><text x="800" y="484" class="note">tinygrad</text>
  <rect x="8" y="494" width="904" height="18" rx="3" class="sec-bg"/>
  <text x="16" y="507" class="sec cell">NV Direct ioctl (gpu/ — zero deps)</text>
  <text x="24" y="526" class="cell">Device discovery + UUID</text><circle cx="240" cy="522" r="6" class="na"/><circle cx="340" cy="522" r="6" class="na"/><circle cx="460" cy="522" r="6" class="pass"/><text x="555" y="526" class="perf">1</text><text x="610" y="526" class="perf">RTX 3060</text><text x="800" y="526" class="note">Raw syscall</text>
  <text x="24" y="546" class="cell">GPU caps (84 SMs, sm_86)</text><circle cx="240" cy="542" r="6" class="na"/><circle cx="340" cy="542" r="6" class="na"/><circle cx="460" cy="542" r="6" class="pass"/><text x="555" y="546" class="perf">1</text><text x="610" y="546" class="perf">7×6×2 SM</text><text x="800" y="546" class="note">RM control</text>
  <text x="24" y="566" class="cell">Channel group + Ctx share</text><circle cx="240" cy="562" r="6" class="na"/><circle cx="340" cy="562" r="6" class="na"/><circle cx="460" cy="562" r="6" class="pass"/><text x="555" y="566" class="perf">1</text><text x="610" y="566" class="perf">KEPLER+FERMI</text><text x="800" y="566" class="note">Compute path</text>
  <text x="24" y="586" class="cell">Host memory registration</text><circle cx="240" cy="582" r="6" class="na"/><circle cx="340" cy="582" r="6" class="na"/><circle cx="460" cy="582" r="6" class="pass"/><text x="555" y="586" class="perf">1</text><text x="610" y="586" class="perf">NVOS02 + mmap</text><text x="800" y="586" class="note">CPU r/w</text>
  <text x="24" y="606" class="cell">VA space + UVM</text><circle cx="240" cy="602" r="6" class="na"/><circle cx="340" cy="602" r="6" class="na"/><circle cx="460" cy="602" r="6" class="warn"/><text x="555" y="606" class="perf">—</text><text x="610" y="606" class="perf">FERMI_VASPACE</text><text x="800" y="606" class="note">No page fault</text>
  <rect x="8" y="620" width="904" height="28" rx="6" class="footer"/>
  <text x="24" y="638" class="footer-text">66 tests · 7.0K lines Go · 8 PTX kernels · 2 GPU paths · RTX 3060 @ 348 GFLOPS · Qwen2.5-7B @ 1 tok/s · SmolLM2-135M @ 28 tok/s</text>
