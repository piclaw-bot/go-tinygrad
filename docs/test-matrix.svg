  <text x="24" y="342" class="cell">BPE Tokenizer</text><circle cx="240" cy="338" r="6" class="pass"/><circle cx="340" cy="338" r="6" class="na"/><circle cx="460" cy="338" r="6" class="na"/><text x="555" y="342" class="perf">✓</text><text x="610" y="342" class="perf">GPT-2 + Qwen</text><text x="800" y="342" class="note">Str + array</text>
