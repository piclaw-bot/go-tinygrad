  <text x="16" y="201" class="sec cell">Safetensors (safetensors/)</text>
  <text x="24" y="220" class="cell">F16/BF16/F32 + Sharded</text><circle cx="240" cy="216" r="6" class="pass"/><circle cx="340" cy="216" r="6" class="na"/><circle cx="460" cy="216" r="6" class="na"/><text x="555" y="220" class="perf">3</text><text x="610" y="220" class="perf">HuggingFace</text><text x="800" y="220" class="note">Up to 15GB</text>
  <text x="24" y="240" class="cell">GPTQ INT4 Dequantization</text><circle cx="240" cy="236" r="6" class="pass"/><circle cx="340" cy="236" r="6" class="na"/><circle cx="460" cy="236" r="6" class="na"/><text x="555" y="240" class="perf">✓</text><text x="610" y="240" class="perf">∥ 30s→14s</text><text x="800" y="240" class="note">AutoRound</text>
